const ChildrenProject = (function(){
  const UNIT=50;
  let DB={children:[],stats:[],logistics:[],months:MONTHS,currentMonth:'',currentMonthIndex:0};
  let cPage=1;

  const isMale=c=>String(c.gender).includes('ذكر');
  const isOrphan=c=>String(c.orphan).trim()==='نعم';
  const paidNow=c=>String(c.curMark).trim()==='✓';
  const isLate=c=>!paidNow(c);

  function setData(j){
    DB.children=j.children||[];DB.stats=j.stats||[];DB.logistics=j.logistics||[];
    DB.months=j.months||MONTHS;DB.currentMonth=j.currentMonth||'';
    DB.currentMonthIndex=j.currentMonthIndex!=null?j.currentMonthIndex:MONTHS.indexOf(DB.currentMonth);
  }
  function agg(){
    const ch=DB.children,males=ch.filter(isMale).length,orphans=ch.filter(isOrphan).length;
    const paid=ch.filter(paidNow).length,late=ch.length-paid;
    const yearMarks=ch.reduce((a,c)=>a+n0(c.paidMonths),0);
    return{total:ch.length,males,females:ch.length-males,orphans,paid,late,
      coverage:ch.length?Math.round(paid/ch.length*100):0,monthValue:paid*UNIT,yearValue:yearMarks*UNIT,yearMarks};
  }
  function workerStats(){
    const m={};DB.children.forEach(c=>{const w=c.fieldWorker||'غير محدّد';
      m[w]=m[w]||{name:w,kids:0,paidNow:0,late:0,marks:0,usd:0};m[w].kids++;
      paidNow(c)?m[w].paidNow++:m[w].late++;m[w].marks+=n0(c.paidMonths);m[w].usd+=n0(c.paidMonths)*UNIT;});
    return Object.values(m).sort((a,b)=>b.kids-a.kids);
  }

  /* قائمة الصفحات (للـ sidebar وللمشاركة) */
  const PAGES=[
    {id:'overview',label:'النظرة العامة',icon:'gauge'},
    {id:'alerts',label:'التنبيهات',icon:'bell'},
    {id:'workers',label:'الميدانيون',icon:'users'},
    {id:'geo',label:'التوزّع الجغرافي',icon:'pin'},
    {id:'children',label:'الأطفال',icon:'child'},
    {id:'reports',label:'التقارير',icon:'file'},
  ];

  /* عناصر قابلة للإخفاء في المشاركة (KPIs + charts) */
  const ELEMENTS={
    kpis:['total','paid','late','monthValue','males','females','orphans','yearValue'],
    charts:['coverage','money','city','demo'],
  };

  function render(host,perm){
    // perm: {pages:[], kpis:[], charts:[], hideNationalId} أو null للمدير الكامل
    const allowPage=id=>!perm||!perm.pages||perm.pages.includes(id);
    const allowKpi=id=>!perm||!perm.kpis||perm.kpis.includes(id);
    const allowChart=id=>!perm||!perm.charts||perm.charts.includes(id);
    const a=agg();

    let pagesHtml='';
    if(allowPage('overview')) pagesHtml+=pageOverview(a,allowKpi,allowChart);
    if(allowPage('alerts')) pagesHtml+=pageAlerts(a);
    if(allowPage('workers')) pagesHtml+=pageWorkers(a);
    if(allowPage('geo')) pagesHtml+=pageGeo();
    if(allowPage('children')) pagesHtml+=pageChildren();
    if(allowPage('reports')) pagesHtml+=pageReports(a);
    host.innerHTML=pagesHtml;

    // build dynamic content
    if(allowPage('overview')){buildOverview(a,allowKpi,allowChart);}
    if(allowPage('alerts'))buildAlerts(a);
    if(allowPage('workers'))buildWorkers(a);
    if(allowPage('geo'))buildGeo();
    if(allowPage('children')){initFilters();renderCards();}
    if(allowPage('reports'))initReports();

    return {pages:PAGES.filter(p=>allowPage(p.id)),alertCount:a.late};
  }

  /* ---- pages markup ---- */
  function pageOverview(a,aK,aC){
    return `<section class="page active" data-page="overview">
      <div class="phead"><div><div class="eb">لوحة القيادة</div><h1>النظرة العامة على المشروع</h1></div><div class="meta">الشهر المرجعي: <b>${DB.currentMonth}</b> · ${a.total} طفل</div></div>
      <div id="cOvAlert"></div>
      <div class="slabel">مؤشرات الكفالة الفعلية</div>
      <div class="kpis" id="cOvKpis"></div>
      <div class="slabel">التحليل البصري</div>
      <div class="grid g2" id="cOvCharts"></div>
    </section>`;
  }
  function pageAlerts(a){return `<section class="page" data-page="alerts">
    <div class="phead"><div><div class="eb">متابعة عاجلة</div><h1>تنبيهات الكفالات المتأخّرة</h1></div></div>
    <div class="alertbar" id="cAlBanner"></div>
    <div class="toolbar"><input id="cAlSearch" placeholder="بحث بالاسم أو رقم الصندوق…" /><select id="cAlStreak"><option value="">كل درجات التأخّر</option><option value="2">شهرين فأكثر</option><option value="1">شهر واحد</option></select></div>
    <div class="alist" id="cAlList"></div></section>`;}
  function pageWorkers(a){return `<section class="page" data-page="workers">
    <div class="phead"><div><div class="eb">الأداء الميداني</div><h1>مؤشرات أداء الميدانيين</h1></div></div>
    <div class="kpis" id="cWkKpis"></div>
    <div class="slabel">مقارنة الأداء</div>
    <div class="grid g2"><div class="panel"><h3>عدد الأطفال لكل ميداني</h3><div id="cWkLoad"></div></div><div class="panel"><h3>أشهر التبرّع لكل ميداني</h3><div id="cWkPaid"></div></div></div>
    <div class="slabel">جدول الأداء</div>
    <div class="tw"><table class="t" id="cWkTable"><thead><tr><th>الميداني</th><th>الأطفال</th><th>مكفولون</th><th>متأخرون</th><th>أشهر التبرّع</th><th>محصّل</th><th>التغطية</th></tr></thead><tbody></tbody></table></div></section>`;}
  function pageGeo(){return `<section class="page" data-page="geo">
    <div class="phead"><div><div class="eb">التوزّع الجغرافي</div><h1>توزّع الأطفال على المدن</h1></div></div>
    <div class="panel"><div id="cGeoBody"></div></div></section>`;}
  function pageChildren(){return `<section class="page" data-page="children">
    <div class="phead"><div><div class="eb">السجل</div><h1>بطاقات الأطفال</h1></div></div>
    <div class="toolbar"><input id="cChSearch" placeholder="بحث…"/>
      <select id="cChGender"><option value="">كل الأجناس</option><option value="ذكر">ذكر</option><option value="أنثى">أنثى</option></select>
      <select id="cChCity"><option value="">كل المدن</option></select>
      <select id="cChStatus"><option value="">كل الحالات</option><option value="ok">مكفول</option><option value="late">متأخّر</option><option value="orphan">يتيم</option></select>
      <span class="cnt" id="cChCount"></span></div>
    <div class="cards" id="cChGrid"></div><div class="pager" id="cChPager"></div></section>`;}
  function pageReports(a){return `<section class="page" data-page="reports">
    <div class="phead"><div><div class="eb">المخرجات</div><h1>التقارير الشهرية والسنوية</h1></div></div>
    <div class="toolbar"><select id="cRpType"><option value="annual">سنوي شامل</option><option value="monthly">شهري</option></select>
      <select id="cRpMonth"></select><button class="btn pri" onclick="window.print()">طباعة / PDF</button>
      <button class="btn gold" id="cRpCsv">تصدير CSV</button></div>
    <div id="cRpView"></div></section>`;}

  /* ---- builders ---- */
  function buildOverview(a,aK,aC){
    $('#cOvAlert').innerHTML=a.late>0?`<div class="alertbar"><div class="big num">${a.late}</div>
      <div class="tx"><b>كفالة متأخّرة تحتاج متابعة فورية</b><p>${a.late} طفلاً غير مكفول في ${DB.currentMonth} (تغطية ${a.coverage}%).</p></div>
      <button class="btn pri" onclick="Platform.goPage('alerts')">${ic('chev')} عرض القائمة</button></div>`:'';
    const K=[];
    if(aK('total'))K.push(kpi('brand','child',a.total,'إجمالي الأطفال','مسجّلون'));
    if(aK('paid'))K.push(kpi('ok','heart',a.paid,'مكفولون — '+DB.currentMonth,'تغطية '+a.coverage+'%'));
    if(aK('late'))K.push(kpi('bad','clock',a.late,'متأخّرون','في '+DB.currentMonth));
    if(aK('monthValue'))K.push(kpi('gold','money',a.monthValue,'قيمة كفالة الشهر ($)',a.paid+' × $'+UNIT));
    if(aK('males'))K.push(kpi('male','mars',a.males,'ذكور'));
    if(aK('females'))K.push(kpi('female','venus',a.females,'إناث'));
    if(aK('orphans'))K.push(kpi('warn','crack',a.orphans,'الأيتام',Math.round(a.orphans/a.total*100)+'%'));
    if(aK('yearValue'))K.push(kpi('brand','trend',a.yearValue,'محصّل سنوياً ($)',a.yearMarks+' شهر تبرّع'));
    $('#cOvKpis').innerHTML=K.join('');countUp($('#cOvKpis'));

    const paidByM=MONTHS.slice(0,6).map(m=>DB.children.filter(c=>String(c.months?.[m]).trim()==='✓').length);
    const C=[];
    if(aC('coverage'))C.push(`<div class="panel"><h3>تغطية الكفالة عبر الأشهر <span class="tag">مكفول/غير</span></h3>${svgStacked(MSHORT.slice(0,6),paidByM,paidByM.map(v=>a.total-v))}${legend([{label:'مكفول',color:cssv('--ok')},{label:'غير مكفول',color:cssv('--bad')}])}</div>`);
    if(aC('money'))C.push(`<div class="panel"><h3>قيمة الكفالات الشهرية ($) <span class="tag">اتجاه</span></h3>${svgLine(MSHORT.slice(0,6),DB.stats.slice(0,6).map(s=>n0(s.total_usd)))}</div>`);
    if(aC('city')){const cc={};DB.children.forEach(c=>cc[c.city]=(cc[c.city]||0)+1);C.push(`<div class="panel"><h3>توزّع المدن <span class="tag">7 مدن</span></h3>${hbars(Object.entries(cc).sort((x,y)=>y[1]-x[1]).map(([k,v])=>({label:k,value:v})))}</div>`);}
    if(aC('demo'))C.push(`<div class="panel"><h3>التركيبة العامة <span class="tag">جنس/يُتم</span></h3>${svgDonut([{label:'ذكور',value:a.males,color:cssv('--male')},{label:'إناث',value:a.females,color:cssv('--female')},{label:'أيتام',value:a.orphans,color:cssv('--gold')}],{center:'طفل',centerVal:a.total})}${legend([{label:'ذكور '+a.males,color:cssv('--male')},{label:'إناث '+a.females,color:cssv('--female')},{label:'أيتام '+a.orphans,color:cssv('--gold')}])}</div>`);
    $('#cOvCharts').innerHTML=C.join('');
  }
  function buildAlerts(a){
    const s2=DB.children.filter(c=>isLate(c)&&c.unpaidStreak>=2).length;
    $('#cAlBanner').innerHTML=`<div class="big num">${a.late}</div><div class="tx"><b>كفالة متأخّرة في ${DB.currentMonth}</b><p>منهم ${s2} متأخّرون لشهرين فأكثر.</p></div>`;
    const render=()=>{
      const q=($('#cAlSearch').value||'').trim().toLowerCase(),f=$('#cAlStreak').value;
      let list=DB.children.filter(isLate);
      if(f==='2')list=list.filter(c=>c.unpaidStreak>=2);if(f==='1')list=list.filter(c=>c.unpaidStreak===1);
      if(q)list=list.filter(c=>`${c.name} ${c.box} ${c.city}`.toLowerCase().includes(q));
      list.sort((a,b)=>b.unpaidStreak-a.unpaidStreak);
      $('#cAlList').innerHTML=list.length?list.map(c=>{const sc=c.unpaidStreak>=2?'s2':'s1',t=c.unpaidStreak>=2?`متأخّر ${c.unpaidStreak} أشهر`:'متأخّر شهر';
        return `<div class="arow"><div class="bx num">#${esc(c.box)}</div><div class="wh"><b>${esc(c.name)}</b><span>${esc(c.city)} · ${esc(c.fieldWorker||'—')}</span></div><div class="stk ${sc}">${t}</div><button class="go" onclick="ChildrenProject.openCard('${esc(c.box)}')">${ic('chev')}</button></div>`;}).join(''):emptyState('check','لا كفالات متأخّرة مطابقة','الجميع ضمن النطاق مكفول.');
    };
    $('#cAlSearch').oninput=render;$('#cAlStreak').onchange=render;render();
  }
  function buildWorkers(a){
    const W=workerStats();const best=[...W].sort((x,y)=>(y.paidNow/y.kids)-(x.paidNow/x.kids))[0];
    $('#cWkKpis').innerHTML=kpi('brand','users',W.length,'عدد الميدانيين')+kpi('ok','child',(a.total/W.length).toFixed(1),'متوسط الأطفال/ميداني')+kpi('gold','trophy',best?Math.round(best.paidNow/best.kids*100)+'%':'—','أعلى تغطية',best?best.name:'')+kpi('warn','clock',Math.max(...W.map(w=>w.late)),'أعلى متأخرين');
    countUp($('#cWkKpis'));
    $('#cWkLoad').innerHTML=hbars(W.map(w=>({label:w.name,value:w.kids})));
    $('#cWkPaid').innerHTML=hbars(W.map(w=>({label:w.name,value:w.marks})),{color:cssv('--gold')});
    $('#cWkTable tbody').innerHTML=W.map(w=>{const cov=Math.round(w.paidNow/w.kids*100);
      return `<tr><td><b>${esc(w.name)}</b></td><td class="num">${w.kids}</td><td class="num">${w.paidNow}</td><td class="num">${w.late}</td><td class="num">${w.marks}</td><td class="num">${usd(w.usd)}</td><td><span class="chip ${cov>=70?'ok':cov>=40?'warn':'bad'}">${cov}%</span></td></tr>`;}).join('');
  }
  function buildGeo(){
    const cc={};DB.children.forEach(c=>{cc[c.city]=cc[c.city]||{m:0,f:0};isMale(c)?cc[c.city].m++:cc[c.city].f++;});
    const rows=Object.entries(cc).sort((a,b)=>(b[1].m+b[1].f)-(a[1].m+a[1].f));const max=Math.max(...rows.map(([,v])=>v.m+v.f));
    $('#cGeoBody').innerHTML=`<div class="geo">${rows.map(([city,v])=>{const tot=v.m+v.f;
      return `<div class="georow"><div class="cn">${ic('pin')} ${esc(city)}</div><div class="gt" style="width:${tot/max*100}%"><div class="gm" style="width:${tot?v.m/tot*100:0}%"></div><div class="gf" style="width:${tot?v.f/tot*100:0}%"></div></div><div class="gv num">${tot}</div></div>`;}).join('')}</div>${legend([{label:'ذكور',color:cssv('--male')},{label:'إناث',color:cssv('--female')}])}`;
  }
  function initFilters(){
    $('#cChCity').innerHTML='<option value="">كل المدن</option>'+[...new Set(DB.children.map(c=>c.city))].sort().map(c=>`<option>${esc(c)}</option>`).join('');
    ['#cChSearch','#cChGender','#cChCity','#cChStatus'].forEach(s=>$(s).addEventListener('input',()=>{cPage=1;renderCards();}));
  }
  function filterChildren(){
    const q=($('#cChSearch').value||'').trim().toLowerCase(),g=$('#cChGender').value,city=$('#cChCity').value,st=$('#cChStatus').value;
    return DB.children.filter(c=>{if(g&&c.gender!==g)return false;if(city&&c.city!==city)return false;
      if(st==='ok'&&!paidNow(c))return false;if(st==='late'&&!isLate(c))return false;if(st==='orphan'&&!isOrphan(c))return false;
      if(q&&!`${c.name} ${c.box} ${c.city}`.toLowerCase().includes(q))return false;return true;});
  }
  function renderCards(){
    const list=filterChildren();$('#cChCount').textContent=list.length+' طفل';
    const pages=Math.max(1,Math.ceil(list.length/12));if(cPage>pages)cPage=1;
    const slice=list.slice((cPage-1)*12,cPage*12),grid=$('#cChGrid');
    if(!slice.length){grid.innerHTML=`<div style="grid-column:1/-1">${emptyState('search','لا نتائج','غيّر البحث.')}</div>`;$('#cChPager').innerHTML='';return;}
    grid.innerHTML=slice.map(c=>{const m=isMale(c);
      const sc=paidNow(c)?`<span class="chip ok">${ic('check')} مكفول</span>`:(c.unpaidStreak>=2?`<span class="chip bad">${ic('clock')} متأخّر شهرين+</span>`:`<span class="chip warn">${ic('clock')} متأخّر</span>`);
      const strip=MONTHS.slice(0,DB.currentMonthIndex+1).map(mn=>{const v=String(c.months?.[mn]).trim();return `<i class="${v==='✓'?'p':v==='✗'?'x':''}"></i>`;}).join('');
      return `<div class="card ${m?'m':'f'}" onclick="ChildrenProject.openCard('${esc(c.box)}')">
        <div class="hd"><div class="av">${esc((c.name||'؟').charAt(0))}</div><div class="ht"><b>${esc(c.name)}</b><span>${esc(c.city)}</span></div></div>
        <div class="bd"><div class="rw"><span>الجنس/العمر</span><b>${esc(c.gender)} · ${esc(c.age??'—')}</b></div>
          <div class="rw"><span>المرحلة</span><b>${esc(c.stage||'—')}</b></div><div class="rw"><span>الميداني</span><b>${esc(c.fieldWorker||'—')}</b></div>
          <div class="rw"><span>اليُتم</span><b>${isOrphan(c)?'يتيم':'لا'}</b></div><div class="strip">${strip}</div>
          <div class="ft">${sc}<span class="dt num">#${esc(c.box)}</span></div></div></div>`;}).join('');
    let p=`<button ${cPage===1?'disabled':''} onclick="ChildrenProject.setPage(${cPage-1})">${ic('chev')}</button>`;
    for(let i=1;i<=pages;i++){if(pages>7&&Math.abs(i-cPage)>2&&i!==1&&i!==pages){if(i===2||i===pages-1)p+=`<button disabled>…</button>`;continue;}p+=`<button class="${i===cPage?'active':''}" onclick="ChildrenProject.setPage(${i})">${i}</button>`;}
    p+=`<button ${cPage===pages?'disabled':''} onclick="ChildrenProject.setPage(${cPage+1})" style="transform:scaleX(-1)">${ic('chev')}</button>`;
    $('#cChPager').innerHTML=p;
  }
  function openCard(box){
    const c=DB.children.find(x=>String(x.box)===String(box));if(!c)return;const m=isMale(c);
    const cells=MONTHS.map((mn,i)=>{const v=String(c.months?.[mn]).trim(),cls=v==='✓'?'p':v==='✗'?'x':'b',sym=v==='✓'?'✓':v==='✗'?'✗':'—';return `<div class="dm ${cls}"><small>${MSHORT[i]}</small>${sym}</div>`;}).join('');
    const st=paidNow(c)?'<span class="chip ok">مكفول حالياً</span>':`<span class="chip ${c.unpaidStreak>=2?'bad':'warn'}">متأخّر ${c.unpaidStreak} شهر</span>`;
    Platform.openDrawer(m?'':'f',(c.name||'؟').charAt(0),c.name,`صندوق #${esc(c.box)} · ${esc(c.city)} · ${esc(c.gender)}`,st,`
      <div class="ds"><h4>${ic('id')} الهوية</h4><div class="dg">${df('العمر',c.age)}${df('تاريخ الميلاد',c.birthdate)}${df('المدينة',c.city)}${df('اليُتم',c.orphan)}${df('هاتف ولي الأمر',c.guardianPhone)}${df('الحالة النفسية',c.psych)}</div></div>
      <div class="ds"><h4>${ic('cap')} الأكاديمي</h4><div class="dg">${df('المرحلة',c.stage)}${df('الصف',c.grade)}${df('الانتظام',c.attendance)}${df('العمل السابق',c.prevWork)}${df('سبب الانقطاع',c.dropReason,true)}</div></div>
      <div class="ds"><h4>${ic('users')} المتابعة</h4><div class="dg">${df('الميداني',c.fieldWorker)}${df('تاريخ الزيارة',c.visitDate)}${df('احتياج إضافي',c.extraNeed)}${c.boxLink?`<div class="df full"><div class="k">رابط الصندوق</div><div class="vv"><a href="${esc(c.boxLink)}" target="_blank" rel="noopener">${ic('link')} فتح</a></div></div>`:''}</div></div>
      <div class="ds"><h4>${ic('cal')} سجل التبرّعات (${c.paidMonths} شهر)</h4><div class="dms">${cells}</div></div>
      <div class="ds"><h4>${ic('money')} الكفالة المالية</h4><div class="dg">${df('أشهر التبرّع',c.paidMonths)}${df('إجمالي الكفالة',usd(n0(c.paidMonths)*UNIT))}${df('الحسم',(c.discount||0)+'%')}${df('الصافي',usd(c.net_usd||n0(c.paidMonths)*UNIT))}</div></div>`);
  }
  function df(k,v,full){return `<div class="df ${full?'full':''}"><div class="k">${k}</div><div class="vv">${(v===''||v==null)?'—':esc(v)}</div></div>`;}
  function initReports(){
    $('#cRpMonth').innerHTML=DB.stats.map(s=>`<option>${esc(s.month)}</option>`).join('');
    const r=()=>{$('#cRpView').innerHTML=$('#cRpType').value==='annual'?annual():monthly($('#cRpMonth').value);countUp($('#cRpView'));};
    $('#cRpType').onchange=()=>{$('#cRpMonth').style.display=$('#cRpType').value==='monthly'?'block':'none';r();};
    $('#cRpMonth').onchange=r;$('#cRpMonth').style.display='none';$('#cRpCsv').onclick=exportCSV;r();
  }
  function annual(){const a=agg(),tot=DB.stats.reduce((x,s)=>x+n0(s.total_usd),0);
    return `<div class="kpis">${kpi('brand','child',a.total,'إجمالي الأطفال')}${kpi('ok','heart',a.yearMarks,'مجموع أشهر التبرّع')}${kpi('gold','money',tot,'إجمالي الكفالات ($)')}${kpi('warn','crack',a.orphans,'الأيتام')}</div>
    <div class="slabel">الملخّص الشهري</div><div class="tw"><table class="t"><thead><tr><th>الشهر</th><th>مكفول</th><th>غير مكفول</th><th>التغطية</th><th>القيمة</th></tr></thead><tbody>${DB.stats.map(s=>`<tr><td>${esc(s.month)}</td><td class="num">${fmt(s.sponsored)}</td><td class="num">${fmt(s.unsponsored)}</td><td class="num">${Math.round(n0(s.coverage)*100)}%</td><td class="num">${usd(s.total_usd)}</td></tr>`).join('')}</tbody></table></div>`;}
  function monthly(month){const s=DB.stats.find(x=>x.month===month);if(!s)return emptyState('file','لا بيانات','');
    const late=DB.children.filter(c=>String(c.months?.[month]).trim()!=='✓');
    return `<div class="kpis">${kpi('ok','heart',n0(s.sponsored),'مكفولون — '+month)}${kpi('bad','clock',n0(s.unsponsored),'غير مكفولين')}${kpi('gold','money',n0(s.total_usd),'القيمة ($)')}${kpi('brand','percent',Math.round(n0(s.coverage)*100),'التغطية %')}</div>
    <div class="slabel">غير المكفولين في ${month} (${late.length})</div><div class="tw"><table class="t"><thead><tr><th>#</th><th>الاسم</th><th>المدينة</th><th>الميداني</th></tr></thead><tbody>${late.map(c=>`<tr><td class="num">${esc(c.box)}</td><td>${esc(c.name)}</td><td>${esc(c.city)}</td><td>${esc(c.fieldWorker||'—')}</td></tr>`).join('')||'<tr><td colspan="4" style="text-align:center">الجميع مكفول 🎉</td></tr>'}</tbody></table></div>`;}
  function exportCSV(){
    const head=['رقم الصندوق','الاسم','الجنس','المدينة','العمر','المرحلة','الميداني','أشهر التبرّع','الحالة','تأخّر'];
    const rows=DB.children.map(c=>[c.box,c.name,c.gender,c.city,c.age,c.stage,c.fieldWorker,c.paidMonths,paidNow(c)?'مكفول':'متأخّر',c.unpaidStreak]);
    Platform.downloadCSV([head,...rows],'الأطفال');
  }

  return {setData,render,openCard,setPage:i=>{cPage=i;renderCards();},PAGES,ELEMENTS,agg};
})();

</script>
<script>
/* ===================================================================
   مشروع الطلبة الجامعيين — وحدة العرض (project_students.js)
   داشبورد مخصّص: أكاديمي + مالي. مختلف بنيوياً عن مشروع الأطفال.
   =================================================================== */
const StudentsProject = (function(){
  let DB={students:[],payments:[]};
  let sPage=1;

  const isMale=s=>String(s.gender).includes('ذكر');
  const hasFinance=()=>DB.payments.length>0 || DB.students.some(s=>n0(s.payCount)>0||n0(s.totalIn)>0);

  function setData(j){DB.students=j.students||[];DB.payments=j.payments||[];}

  function agg(){
    const S=DB.students,males=S.filter(isMale).length;
    const unis=new Set(S.map(s=>s.university).filter(Boolean));
    const majors=new Set(S.map(s=>s.major).filter(Boolean));
    const cities=new Set(S.map(s=>s.city).filter(Boolean));
    const parallel=S.filter(s=>String(s.admissionType).includes('موازي')).length;
    const general=S.filter(s=>String(s.admissionType).includes('عام')).length;
    const ages=S.map(s=>n0(s.age)).filter(a=>a>0);
    const avgAge=ages.length?(ages.reduce((a,b)=>a+b,0)/ages.length):0;
    // financial (may be zero)
    const totalIn=S.reduce((a,s)=>a+n0(s.totalIn),0);
    const totalPaid=S.reduce((a,s)=>a+n0(s.totalPaid),0);
    const balance=S.reduce((a,s)=>a+n0(s.balance),0);
    const payCount=S.reduce((a,s)=>a+n0(s.payCount),0);
    const collectRate=totalIn?Math.round(totalPaid/totalIn*100):0;
    return{total:S.length,males,females:S.length-males,unis:unis.size,majors:majors.size,
      cities:cities.size,parallel,general,avgAge,totalIn,totalPaid,balance,payCount,collectRate};
  }
  const YEARS=['الأولى','الثانية','الثالثة','الرابعة','الخامسة','السادسة'];

  const PAGES=[
    {id:'overview',label:'النظرة العامة',icon:'gauge'},
    {id:'academic',label:'التحليل الأكاديمي',icon:'cap'},
    {id:'finance',label:'المتابعة المالية',icon:'wallet'},
    {id:'geo',label:'التوزّع الجغرافي',icon:'pin'},
    {id:'students',label:'الطلاب',icon:'users'},
    {id:'reports',label:'التقارير',icon:'file'},
  ];
  const ELEMENTS={
    kpis:['total','males','females','unis','majors','cities','parallel','avgAge','payCount','totalIn','totalPaid','balance','collectRate'],
    charts:['gender','years','unis','majors','admission','cities'],
  };

  function render(host,perm){
    const aP=id=>!perm||!perm.pages||perm.pages.includes(id);
    const aK=id=>!perm||!perm.kpis||perm.kpis.includes(id);
    const aC=id=>!perm||!perm.charts||perm.charts.includes(id);
    const hideId=perm&&perm.hideNationalId;
    const a=agg();
    let html='';
    if(aP('overview'))html+=secOverview();
    if(aP('academic'))html+=secAcademic();
    if(aP('finance'))html+=secFinance();
    if(aP('geo'))html+=secGeo();
    if(aP('students'))html+=secStudents();
    if(aP('reports'))html+=secReports();
    host.innerHTML=html;
    if(aP('overview'))buildOverview(a,aK,aC);
    if(aP('academic'))buildAcademic(aC);
    if(aP('finance'))buildFinance(a,aK);
    if(aP('geo'))buildGeo();
    if(aP('students')){initFilters();renderCards(hideId);}
    if(aP('reports'))initReports();
    return {pages:PAGES.filter(p=>aP(p.id)),alertCount:0};
  }

  /* ---- sections markup ---- */
  function secOverview(){return `<section class="page active" data-page="overview">
    <div class="phead"><div><div class="eb">لوحة القيادة</div><h1>النظرة العامة على المشروع</h1></div><div class="meta" id="sOvMeta"></div></div>
    <div class="slabel">المؤشرات العامة</div><div class="kpis" id="sOvKpis"></div>
    <div class="slabel">التحليل البصري</div><div class="grid g2" id="sOvCharts"></div></section>`;}
  function secAcademic(){return `<section class="page" data-page="academic">
    <div class="phead"><div><div class="eb">الأكاديمي</div><h1>التحليل الأكاديمي</h1></div></div>
    <div class="kpis" id="sAcKpis"></div>
    <div class="slabel">التوزيعات</div>
    <div class="grid g2">
      <div class="panel"><h3>${ic('building')} توزّع الطلاب على الجامعات</h3><div id="sAcUni"></div></div>
      <div class="panel"><h3>${ic('book')} التوزّع حسب التخصص</h3><div id="sAcMajor"></div></div>
      <div class="panel"><h3>${ic('cap')} حسب السنة الدراسية</h3><div id="sAcYear"></div></div>
      <div class="panel"><h3>${ic('star')} نوع القبول</h3><div id="sAcAdm"></div></div>
    </div></section>`;}
  function secFinance(){return `<section class="page" data-page="finance">
    <div class="phead"><div><div class="eb">المالية</div><h1>المتابعة المالية والتحصيل</h1></div></div>
    <div id="sFinContent"></div></section>`;}
  function secGeo(){return `<section class="page" data-page="geo">
    <div class="phead"><div><div class="eb">التوزّع الجغرافي</div><h1>توزّع الطلاب على المدن</h1></div></div>
    <div class="panel"><div id="sGeoBody"></div></div></section>`;}
  function secStudents(){return `<section class="page" data-page="students">
    <div class="phead"><div><div class="eb">السجل</div><h1>بطاقات الطلاب</h1></div></div>
    <div class="toolbar"><input id="sStSearch" placeholder="بحث بالاسم أو الجامعة أو التخصص…"/>
      <select id="sStGender"><option value="">كل الأجناس</option><option value="ذكر">ذكر</option><option value="أنثى">أنثى</option></select>
      <select id="sStYear"><option value="">كل السنوات</option>${YEARS.map(y=>`<option>${y}</option>`).join('')}</select>
      <select id="sStAdm"><option value="">كل أنواع القبول</option><option value="عام">عام</option><option value="موازي">موازي</option></select>
      <select id="sStCity"><option value="">كل المدن</option></select>
      <span class="cnt" id="sStCount"></span></div>
    <div class="cards" id="sStGrid"></div><div class="pager" id="sStPager"></div></section>`;}
  function secReports(){return `<section class="page" data-page="reports">
    <div class="phead"><div><div class="eb">المخرجات</div><h1>التقارير والإحصاءات</h1></div></div>
    <div class="toolbar"><button class="btn pri" onclick="window.print()">طباعة / PDF</button><button class="btn gold" id="sRpCsv">تصدير CSV</button></div>
    <div id="sRpView"></div></section>`;}

  /* ---- builders ---- */
  function buildOverview(a,aK,aC){
    $('#sOvMeta').innerHTML=`${a.total} طالب · ${a.unis} جامعة · ${a.majors} تخصّص`;
    const K=[];
    if(aK('total'))K.push(kpi('brand','users',a.total,'إجمالي الطلاب','مسجّلون'));
    if(aK('males'))K.push(kpi('male','mars',a.males,'ذكور'));
    if(aK('females'))K.push(kpi('female','venus',a.females,'إناث'));
    if(aK('unis'))K.push(kpi('brand','building',a.unis,'عدد الجامعات','جهات مختلفة'));
    if(aK('majors'))K.push(kpi('gold','book',a.majors,'عدد التخصصات'));
    if(aK('parallel'))K.push(kpi('warn','star',a.parallel,'قبول موازي',`مقابل ${a.general} عام`));
    if(aK('avgAge'))K.push(kpi('ok','cap',a.avgAge.toFixed(1),'متوسط العمر','سنة'));
    if(aK('cities'))K.push(kpi('brand','pin',a.cities,'عدد المدن'));
    $('#sOvKpis').innerHTML=K.join('');countUp($('#sOvKpis'));

    const C=[];
    if(aC('gender'))C.push(`<div class="panel"><h3>التركيبة حسب الجنس <span class="tag">${a.total} طالب</span></h3>${svgDonut([{label:'إناث',value:a.females,color:cssv('--female')},{label:'ذكور',value:a.males,color:cssv('--male')}],{center:'طالب',centerVal:a.total})}${legend([{label:'إناث '+a.females,color:cssv('--female')},{label:'ذكور '+a.males,color:cssv('--male')}])}</div>`);
    if(aC('years')){const yc=YEARS.map(y=>({label:y,value:DB.students.filter(s=>s.year===y).length})).filter(x=>x.value>0);C.push(`<div class="panel"><h3>التوزّع حسب السنة الدراسية <span class="tag">Bar</span></h3>${svgBar(yc,{color:cssv('--brand')})}</div>`);}
    if(aC('admission'))C.push(`<div class="panel"><h3>نوع القبول <span class="tag">عام/موازي</span></h3>${svgDonut([{label:'عام',value:a.general,color:cssv('--brand')},{label:'موازي',value:a.parallel,color:cssv('--gold')}],{center:'طالب',centerVal:a.total})}${legend([{label:'عام '+a.general,color:cssv('--brand')},{label:'موازي '+a.parallel,color:cssv('--gold')}])}</div>`);
    if(aC('unis')){const uc=topCounts(s=>s.university,6);C.push(`<div class="panel"><h3>أكثر الجامعات تمثيلاً <span class="tag">أعلى 6</span></h3>${hbars(uc)}</div>`);}
    $('#sOvCharts').innerHTML=C.join('');
  }
  function buildAcademic(aC){
    const a=agg();
    $('#sAcKpis').innerHTML=kpi('brand','building',a.unis,'الجامعات')+kpi('gold','book',a.majors,'التخصصات')+kpi('warn','star',a.parallel,'قبول موازي')+kpi('ok','cap',a.avgAge.toFixed(1),'متوسط العمر');
    countUp($('#sAcKpis'));
    $('#sAcUni').innerHTML=hbars(topCounts(s=>s.university,8));
    $('#sAcMajor').innerHTML=hbars(topCounts(s=>s.major,8),{color:cssv('--gold')});
    const yc=YEARS.map(y=>({label:y,value:DB.students.filter(s=>s.year===y).length})).filter(x=>x.value>0);
    $('#sAcYear').innerHTML=svgBar(yc,{color:cssv('--brand')});
    $('#sAcAdm').innerHTML=svgDonut([{label:'عام',value:a.general,color:cssv('--brand')},{label:'موازي',value:a.parallel,color:cssv('--gold')}],{center:'طالب',centerVal:a.total})+legend([{label:'عام '+a.general,color:cssv('--brand')},{label:'موازي '+a.parallel,color:cssv('--gold')}]);
  }
  function buildFinance(a,aK){
    const host=$('#sFinContent');
    if(!hasFinance()){
      host.innerHTML=`<div class="kpis">
        ${kpi('brand','users',a.total,'الطلاب المسجّلون','جاهزون للكفالة')}
        ${kpi('gold','wallet','—','إجمالي المبلغ الداخل','بانتظار البيانات')}
        ${kpi('ok','check','—','المبلغ المدفوع','بانتظار البيانات')}
        ${kpi('warn','clock','—','نسبة التحصيل','بانتظار البيانات')}</div>
        ${emptyState('wallet','دفتر الدفعات فارغ في ملف Excel',
        'ورقة «دفتر الدفعات» لم تُملأ بعد، وأعمدة المبالغ تُحتسب منها تلقائياً. أدخِل الدفعات في Google Sheet (رقم الصندوق، تاريخ التسليم، <code>المبلغ الداخل</code>، <code>المبلغ المدفوع</code>) لتظهر هنا: نسبة التحصيل، الرصيد المتبقّي، متوسط الدفعة، وتحليل المتأخرات. لم تُختلق أرقام احتراماً لدقّة البيانات.')}`;
      return;
    }
    // full financial view when data exists
    host.innerHTML=`<div class="kpis" id="sFinK"></div>
      <div class="slabel">تحليل التحصيل</div>
      <div class="grid g2">
        <div class="panel"><h3>${ic('wallet')} الداخل مقابل المدفوع</h3><div id="sFinBars"></div></div>
        <div class="panel"><h3>${ic('percent')} نسبة التحصيل</h3><div id="sFinRate"></div></div></div>
      <div class="slabel">سجل الدفعات</div>
      <div class="tw"><table class="t"><thead><tr><th>الطالب</th><th>عدد الدفعات</th><th>الداخل</th><th>المدفوع</th><th>الرصيد</th><th>آخر تسليم</th></tr></thead>
      <tbody>${DB.students.filter(s=>n0(s.payCount)>0).map(s=>`<tr><td><b>${esc(s.name)}</b></td><td class="num">${fmt(s.payCount)}</td><td class="num">${usd(s.totalIn)}</td><td class="num">${usd(s.totalPaid)}</td><td class="num">${usd(s.balance)}</td><td>${esc(s.lastPayment||'—')}</td></tr>`).join('')}</tbody></table></div>`;
    $('#sFinK').innerHTML=kpi('brand','calc',a.payCount,'إجمالي الدفعات')+kpi('gold','wallet',a.totalIn,'الداخل ($)')+kpi('ok','check',a.totalPaid,'المدفوع ($)')+kpi('warn','clock',a.balance,'الرصيد المتبقّي ($)')+kpi('brand','percent',a.collectRate,'نسبة التحصيل %');
    countUp($('#sFinK'));
    $('#sFinBars').innerHTML=svgBar([{label:'الداخل',value:Math.round(a.totalIn),color:cssv('--gold')},{label:'المدفوع',value:Math.round(a.totalPaid),color:cssv('--ok')},{label:'الرصيد',value:Math.round(a.balance),color:cssv('--bad')}]);
    $('#sFinRate').innerHTML=svgDonut([{label:'محصّل',value:a.totalPaid,color:cssv('--ok')},{label:'متبقّي',value:a.balance,color:cssv('--bad')}],{center:a.collectRate+'%',centerVal:a.collectRate+'%'});
  }
  function buildGeo(){
    const cc={};DB.students.forEach(s=>{const c=s.city||'غير محدّد';cc[c]=cc[c]||{m:0,f:0};isMale(s)?cc[c].m++:cc[c].f++;});
    const rows=Object.entries(cc).sort((a,b)=>(b[1].m+b[1].f)-(a[1].m+a[1].f));const max=Math.max(...rows.map(([,v])=>v.m+v.f));
    $('#sGeoBody').innerHTML=`<div class="geo">${rows.map(([city,v])=>{const tot=v.m+v.f;
      return `<div class="georow"><div class="cn">${ic('pin')} ${esc(city)}</div><div class="gt" style="width:${tot/max*100}%"><div class="gm" style="width:${tot?v.m/tot*100:0}%"></div><div class="gf" style="width:${tot?v.f/tot*100:0}%"></div></div><div class="gv num">${tot}</div></div>`;}).join('')}</div>${legend([{label:'ذكور',color:cssv('--male')},{label:'إناث',color:cssv('--female')}])}`;
  }
  function initFilters(){
    $('#sStCity').innerHTML='<option value="">كل المدن</option>'+[...new Set(DB.students.map(s=>s.city))].filter(Boolean).sort().map(c=>`<option>${esc(c)}</option>`).join('');
    ['#sStSearch','#sStGender','#sStYear','#sStAdm','#sStCity'].forEach(s=>$(s).addEventListener('input',()=>{sPage=1;renderCards();}));
  }
  function filterStudents(){
    const q=($('#sStSearch').value||'').trim().toLowerCase(),g=$('#sStGender').value,y=$('#sStYear').value,adm=$('#sStAdm').value,city=$('#sStCity').value;
    return DB.students.filter(s=>{if(g&&s.gender!==g)return false;if(y&&s.year!==y)return false;
      if(adm&&!String(s.admissionType).includes(adm))return false;if(city&&s.city!==city)return false;
      if(q&&!`${s.name} ${s.university} ${s.major} ${s.city}`.toLowerCase().includes(q))return false;return true;});
  }
  function renderCards(hideId){
    const list=filterStudents();$('#sStCount').textContent=list.length+' طالب';
    const pages=Math.max(1,Math.ceil(list.length/12));if(sPage>pages)sPage=1;
    const slice=list.slice((sPage-1)*12,sPage*12),grid=$('#sStGrid');
    if(!slice.length){grid.innerHTML=`<div style="grid-column:1/-1">${emptyState('search','لا نتائج','غيّر البحث.')}</div>`;$('#sStPager').innerHTML='';return;}
    grid.innerHTML=slice.map((s,idx)=>{const m=isMale(s);const gi=DB.students.indexOf(s);
      return `<div class="card ${m?'m':'f'}" onclick="StudentsProject.openCard(${gi},${hideId?1:0})">
        <div class="hd"><div class="av">${esc((s.name||'؟').charAt(0))}</div><div class="ht"><b>${esc(s.name)}</b><span>${esc(s.city||'—')}</span></div></div>
        <div class="bd"><div class="rw"><span>الجنس/العمر</span><b>${esc(s.gender)} · ${esc(s.age??'—')}</b></div>
          <div class="rw"><span>الجامعة</span><b title="${esc(s.university)}">${esc(trunc(s.university,18))}</b></div>
          <div class="rw"><span>التخصص</span><b title="${esc(s.major)}">${esc(trunc(s.major,18))}</b></div>
          <div class="rw"><span>السنة</span><b>${esc(s.year||'—')}</b></div>
          <div class="ft"><span class="chip ${String(s.admissionType).includes('موازي')?'warn':'ok'}">${esc(s.admissionType||'—')}</span><span class="dt">${esc(trunc(s.major,10))}</span></div></div></div>`;}).join('');
    let p=`<button ${sPage===1?'disabled':''} onclick="StudentsProject.setPage(${sPage-1})">${ic('chev')}</button>`;
    for(let i=1;i<=pages;i++){if(pages>7&&Math.abs(i-sPage)>2&&i!==1&&i!==pages){if(i===2||i===pages-1)p+=`<button disabled>…</button>`;continue;}p+=`<button class="${i===sPage?'active':''}" onclick="StudentsProject.setPage(${i})">${i}</button>`;}
    p+=`<button ${sPage===pages?'disabled':''} onclick="StudentsProject.setPage(${sPage+1})" style="transform:scaleX(-1)">${ic('chev')}</button>`;
    $('#sStPager').innerHTML=p;
  }
  function openCard(gi,hideId){
    const s=DB.students[gi];if(!s)return;const m=isMale(s);
    const idVal=hideId?maskId(s.nationalId):s.nationalId;
    const fin=hasFinance()&&n0(s.payCount)>0?`<div class="ds"><h4>${ic('wallet')} المالية</h4><div class="dg">${df('عدد الدفعات',s.payCount)}${df('الداخل',usd(s.totalIn))}${df('المدفوع',usd(s.totalPaid))}${df('الرصيد',usd(s.balance))}${df('آخر تسليم',s.lastPayment,true)}</div></div>`:`<div class="ds"><h4>${ic('wallet')} المالية</h4><div class="df full"><div class="vv" style="color:var(--text3)">لا توجد دفعات مسجّلة بعد لهذا الطالب.</div></div></div>`;
    Platform.openDrawer(m?'':'f',(s.name||'؟').charAt(0),s.name,`${esc(s.city||'—')} · ${esc(s.gender)} · ${esc(s.age??'—')} سنة`,`<span class="chip ${String(s.admissionType).includes('موازي')?'warn':'ok'}">${esc(s.admissionType||'—')}</span>`,`
      <div class="ds"><h4>${ic('id')} الهوية</h4><div class="dg">${df('العمر',s.age)}${df('تاريخ الميلاد',s.birthdate)}${df('المدينة',s.city)}${df('الرقم الوطني',idVal)}</div></div>
      <div class="ds"><h4>${ic('cap')} الأكاديمي</h4><div class="dg">${df('الجامعة',s.university,true)}${df('التخصص',s.major)}${df('السنة',s.year)}${df('نوع القبول',s.admissionType)}${df('الرقم الجامعي',s.uniId)}${df('سنوات التخصص',s.majorYears)}</div></div>
      <div class="ds"><h4>${ic('users')} المتابعة</h4><div class="dg">${df('تاريخ الزيارة',s.visitDate)}${df('حالة التأمين',s.insuranceStatus||'—')}${df('نوع الكفالة',s.sponsorType||'—')}${df('بدء الكفالة',s.sponsorStart||'—')}${s.boxLink?`<div class="df full"><div class="k">رابط الصندوق</div><div class="vv"><a href="${esc(s.boxLink)}" target="_blank" rel="noopener">${ic('link')} فتح</a></div></div>`:''}</div></div>
      ${fin}`);
  }
  function df(k,v,full){return `<div class="df ${full?'full':''}"><div class="k">${k}</div><div class="vv">${(v===''||v==null)?'—':esc(v)}</div></div>`;}
  function initReports(){
    const r=()=>{$('#sRpView').innerHTML=report();countUp($('#sRpView'));};
    $('#sRpCsv').onclick=exportCSV;r();
  }
  function report(){
    const a=agg();
    const uni=topCounts(s=>s.university,100),major=topCounts(s=>s.major,100);
    return `<div class="kpis">${kpi('brand','users',a.total,'إجمالي الطلاب')}${kpi('brand','building',a.unis,'الجامعات')}${kpi('gold','book',a.majors,'التخصصات')}${kpi('warn','star',a.parallel,'قبول موازي')}</div>
      <div class="slabel">ملخّص حسب الجامعة</div>
      <div class="tw"><table class="t"><thead><tr><th>الجامعة</th><th>عدد الطلاب</th></tr></thead><tbody>${uni.map(u=>`<tr><td>${esc(u.label)}</td><td class="num">${u.value}</td></tr>`).join('')}</tbody><tfoot><tr><td>الإجمالي</td><td class="num">${a.total}</td></tr></tfoot></table></div>
      <div class="slabel">ملخّص حسب التخصص</div>
      <div class="tw"><table class="t"><thead><tr><th>التخصص</th><th>عدد الطلاب</th></tr></thead><tbody>${major.map(u=>`<tr><td>${esc(u.label)}</td><td class="num">${u.value}</td></tr>`).join('')}</tbody></table></div>`;
  }
  function exportCSV(){
    const head=['الاسم','الجنس','العمر','المدينة','الجامعة','التخصص','السنة','نوع القبول','الرقم الجامعي','عدد الدفعات','المبلغ المدفوع'];
    const rows=DB.students.map(s=>[s.name,s.gender,s.age,s.city,s.university,s.major,s.year,s.admissionType,s.uniId,s.payCount,s.totalPaid]);
    Platform.downloadCSV([head,...rows],'الطلاب');
  }

  /* helpers */
  function topCounts(fn,limit){const m={};DB.students.forEach(s=>{const k=fn(s)||'غير محدّد';m[k]=(m[k]||0)+1;});
    return Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,limit).map(([label,value])=>({label,value}));}
  function trunc(s,n){s=String(s||'');return s.length>n?s.slice(0,n-1)+'…':s;}

  return {setData,render,openCard,setPage:i=>{sPage=i;renderCards();},PAGES,ELEMENTS,agg};
})();

</script>
<script>
/* ===================================================================
   منصّة إدارة المشاريع — المنسّق الرئيسي (platform.js)
   يربط: سجلّ المشاريع · تسجيل الدخول · Sidebar · نظام المشاركة · الدرج
   البنية Modular: إضافة مشروع = إدخال واحد في PROJECTS.
   =================================================================== */
const Platform = (function(){

  /* ============ سجلّ المشاريع (modular) ============
     لإضافة مشروع جديد مستقبلاً: أضف كائناً هنا مع بياناته ووحدة عرضه.
     apiUrl: رابط Apps Script Web App الخاص بالمشروع (اختياري).
       • فارغ/افتراضي → بيانات Excel المدمجة.
       • مملوء → بيانات حيّة من Google Sheets (مع رجوع آمن للمدمج عند الفشل). */
  const PROJECTS=[
    {id:'children',name:'مشروع كفالة الأطفال',sub:'الطفولة المكسورة',icon:'child',
     accent:'#0f6b54',data:()=>EMBEDDED_CHILDREN,module:()=>ChildrenProject,
     apiUrl:'https://script.google.com/macros/s/AKfycbylzfSUGEOJgF9b_0XaPawGqnh4cE6nF7myclhv6CBQsaFT8RwODC2FCSnHF0nt65jO/exec'},
    {id:'students',name:'مشروع الطلبة الجامعيين',sub:'الدعم الجامعي',icon:'cap',
     accent:'#2563a8',data:()=>EMBEDDED_STUDENTS,module:()=>StudentsProject,
     apiUrl:'https://script.google.com/macros/s/AKfycbxEz_EJID2BGGKdLQWXxEzMUe9lzf3c3pxnaQC6V_DCdExSijjD5g-VvtC7v-dOa4mvhQ/exec'},
  ];

  let currentProject=null;
  let currentModule=null;
  let currentPages=[];
  let sharePerm=null;      // null = مدير كامل، أو إعداد المشاركة
  let isShareView=false;

  /* ============ تسجيل الدخول ============ */
  function checkAuth(){
    // وضع المشاركة يتجاوز تسجيل دخول المدير
    const hash=location.hash;
    if(hash.startsWith('#share=')){ return initShareView(hash.slice(7)); }
    const session=sessionStorage.getItem('cd_admin');
    if(session==='1'){ showApp(); return; }
    showLogin();
  }
  function showLogin(){
    $('#loginScreen').style.display='flex';
    $('#appShell').style.display='none';
    $('#shareGate').style.display='none';
    $('#loginForm').onsubmit=e=>{
      e.preventDefault();
      const u=$('#loginUser').value.trim(),p=$('#loginPass').value;
      if(u===ADMIN.user && p===ADMIN.pass){ sessionStorage.setItem('cd_admin','1'); showApp(); }
      else { $('#loginErr').style.display='block'; $('#loginPass').value=''; }
    };
    setTimeout(()=>$('#loginUser')?.focus(),100);
  }
  function logout(){ sessionStorage.removeItem('cd_admin'); location.hash=''; location.reload(); }

  /* ============ تشغيل التطبيق (مدير) ============ */
  function showApp(){
    $('#loginScreen').style.display='none';
    $('#shareGate').style.display='none';
    $('#appShell').style.display='flex';
    isShareView=false; sharePerm=null;
    buildSidebar();
    openProject(PROJECTS[0].id);
    bindGlobalUI();
  }

  function buildSidebar(){
    $('#sbProjects').innerHTML=PROJECTS.map(p=>`
      <button class="sb-proj" data-proj="${p.id}" onclick="Platform.openProject('${p.id}')">
        <span class="sb-ic" style="background:${p.accent}22;color:${p.accent}">${ic(p.icon)}</span>
        <span class="sb-tx"><b>${esc(p.name)}</b><small>${esc(p.sub)}</small></span></button>`).join('');
    // admin tools
    $('#sbTools').style.display='block';
    $('#shareBtn').innerHTML=ic('share')+' مشاركة لوحة';
    $('#logoutBtn').innerHTML=ic('logout')+' تسجيل الخروج';
  }

  /* جلب بيانات مشروع: حيّ من Apps Script إن توفّر الرابط، وإلا المدمج.
     يحفظ النتيجة في كاش لتفادي إعادة الجلب عند التبديل. */
  const _cache={};
  async function loadProjectData(proj){
    if(_cache[proj.id]) return _cache[proj.id];
    const hasApi = proj.apiUrl && !proj.apiUrl.startsWith('PUT_');
    if(!hasApi){ _cache[proj.id]={data:proj.data(),live:false}; return _cache[proj.id]; }
    try{
      const res=await fetch(proj.apiUrl,{method:'GET'});
      if(!res.ok) throw new Error('HTTP '+res.status);
      const j=await res.json();
      if(j.ok===false) throw new Error(j.error||'API error');
      _cache[proj.id]={data:j,live:true};
    }catch(err){
      console.error('['+proj.id+'] فشل الجلب الحيّ:',err);
      _cache[proj.id]={data:proj.data(),live:false,failed:true};
    }
    return _cache[proj.id];
  }

  function setSrcBadge(live,failed){
    const b=$('#srcBadge'); if(!b) return;
    if(live){ b.className='src live'; b.innerHTML=ic('trend')+' متصل مباشرة'; }
    else if(failed){ b.className='src'; b.innerHTML=ic('alert')+' بيانات مدمجة (تعذّر الاتصال)'; }
    else { b.className='src'; b.innerHTML=ic('file')+' بيانات مدمجة'; }
  }

  async function openProject(id){
    const proj=PROJECTS.find(p=>p.id===id);if(!proj)return;
    currentProject=proj;currentModule=proj.module();
    $$('#sbProjects .sb-proj').forEach(b=>b.classList.toggle('active',b.dataset.proj===id));
    $('#topProjectName').textContent=proj.name;
    document.documentElement.style.setProperty('--brand',proj.accent);
    // حالة تحميل بسيطة داخل المضيف
    $('#projectHost').innerHTML='<div class="empty" style="padding:80px"><div class="spin" style="margin:0 auto 16px"></div><b>جارٍ تحميل بيانات المشروع…</b></div>';
    const loaded=await loadProjectData(proj);
    currentModule.setData(loaded.data);
    setSrcBadge(loaded.live,loaded.failed);
    const res=currentModule.render($('#projectHost'),sharePerm);
    currentPages=res.pages;
    buildPageNav(res.pages,res.alertCount);
    if(res.pages.length)goPage(res.pages[0].id);
  }

  function buildPageNav(pages,alertCount){
    $('#pageNav').innerHTML=pages.map((p,i)=>`
      <button data-page="${p.id}" onclick="Platform.goPage('${p.id}')">${ic(p.icon)} ${esc(p.label)}${p.id==='alerts'&&alertCount?` <span class="bn">${alertCount}</span>`:''}</button>`).join('');
  }
  function goPage(id){
    $$('#projectHost .page').forEach(p=>p.classList.toggle('active',p.dataset.page===id));
    $$('#pageNav button').forEach(b=>b.classList.toggle('active',b.dataset.page===id));
    window.scrollTo({top:0,behavior:'smooth'});
  }

  /* ============ الدرج (مشترك بين المشاريع) ============ */
  function openDrawer(genderCls,initial,title,sub,statusChip,bodyHtml){
    $('#drawerContent').innerHTML=`<div class="dh ${genderCls}"><button class="cl" onclick="Platform.closeDrawer()">✕</button>
      <div class="avl">${esc(initial)}</div><h2>${esc(title)}</h2><div class="sb">${sub}</div><div style="margin-top:10px">${statusChip}</div></div>
      <div class="db">${bodyHtml}</div>`;
    $('#drawer').classList.add('open');$('#dbg').classList.add('open');
  }
  function closeDrawer(){$('#drawer').classList.remove('open');$('#dbg').classList.remove('open');}

  /* ============ التصدير CSV (مشترك) ============ */
  function downloadCSV(rows,name){
    const csv=rows.map(r=>r.map(v=>{v=String(v==null?'':v);return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;}).join(',')).join('\n');
    const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'});const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download=name+'.csv';a.click();URL.revokeObjectURL(url);toast('تم تصدير CSV');
  }

  /* ============ الثيم ============ */
  function applyTheme(t){document.documentElement.setAttribute('data-theme',t);$$('.themeBtn').forEach(b=>b.innerHTML=ic(t==='dark'?'sun':'moon'));try{localStorage.setItem('cd_theme',t);}catch(_){}}
  function toggleTheme(){const cur=document.documentElement.getAttribute('data-theme');applyTheme(cur==='dark'?'light':'dark');
    // re-render current project to refresh chart colors
    if(currentModule){const res=currentModule.render($('#projectHost'),sharePerm);buildPageNav(res.pages,res.alertCount);}}

  function bindGlobalUI(){
    $$('.themeBtn').forEach(b=>b.onclick=toggleTheme);
    $('#logoutBtn').onclick=logout;
    $('#shareBtn').onclick=openShareModal;
    $('#dbg').onclick=closeDrawer;
    const rb=$('#refreshBtn');
    if(rb){ rb.innerHTML=ic('refresh');
      rb.onclick=async()=>{ if(!currentProject)return; delete _cache[currentProject.id]; toast('جارٍ التحديث…'); await openProject(currentProject.id); toast('تم التحديث'); }; }
    document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeDrawer();closeShareModal();}});
  }

  /* ============================================================
     نظام المشاركة — إنشاء رابط مقيّد
  ============================================================ */
  function openShareModal(){
    const proj=currentProject;const mod=currentModule;
    const pages=mod.PAGES,el=mod.ELEMENTS;
    $('#shareModalBody').innerHTML=`
      <div class="sh-row"><label>المشروع</label>
        <select id="shProj">${PROJECTS.map(p=>`<option value="${p.id}" ${p.id===proj.id?'selected':''}>${esc(p.name)}</option>`).join('')}</select></div>
      <div class="sh-sec"><h4>${ic('grid')} الصفحات المسموح بعرضها</h4><div class="sh-checks" id="shPages"></div></div>
      <div class="sh-sec"><h4>${ic('gauge')} المؤشرات المسموح بها</h4><div class="sh-checks" id="shKpis"></div></div>
      <div class="sh-sec"><h4>${ic('trend')} الرسوم المسموح بها</h4><div class="sh-checks" id="shCharts"></div></div>
      <div class="sh-row"><label>${ic('lock')} إخفاء الأرقام الوطنية</label><input type="checkbox" id="shHideId" checked></div>
      <div class="sh-row"><label>${ic('lock')} كلمة مرور الرابط</label><input type="password" id="shPass" placeholder="اختر كلمة مرور"></div>
      <div id="shResult" style="display:none"></div>`;
    fillShareChecks(proj.id);
    $('#shProj').onchange=()=>fillShareChecks($('#shProj').value);
    $('#shareModal').classList.add('open');$('#shareBg').classList.add('open');
  }
  function fillShareChecks(projId){
    const mod=PROJECTS.find(p=>p.id===projId).module();
    $('#shPages').innerHTML=mod.PAGES.map(p=>chk('pg',p.id,p.label,true)).join('');
    $('#shKpis').innerHTML=mod.ELEMENTS.kpis.map(k=>chk('kpi',k,kpiLabel(projId,k),true)).join('');
    $('#shCharts').innerHTML=mod.ELEMENTS.charts.map(c=>chk('ch',c,chartLabel(projId,c),true)).join('');
  }
  function chk(grp,val,label,checked){return `<label class="sh-chk"><input type="checkbox" data-grp="${grp}" value="${val}" ${checked?'checked':''}><span>${esc(label)}</span></label>`;}
  function kpiLabel(proj,k){const M={total:'الإجمالي',males:'ذكور',females:'إناث',paid:'مكفولون',late:'متأخرون',monthValue:'قيمة الشهر',orphans:'الأيتام',yearValue:'محصّل سنوي',unis:'الجامعات',majors:'التخصصات',cities:'المدن',parallel:'قبول موازي',avgAge:'متوسط العمر',payCount:'الدفعات',totalIn:'الداخل',totalPaid:'المدفوع',balance:'الرصيد',collectRate:'نسبة التحصيل'};return M[k]||k;}
  function chartLabel(proj,c){const M={coverage:'تغطية الكفالة',money:'القيمة الشهرية',city:'المدن',demo:'التركيبة',gender:'الجنس',years:'السنوات',unis:'الجامعات',majors:'التخصصات',admission:'نوع القبول',cities:'المدن'};return M[c]||c;}

  function createShareLink(){
    const projId=$('#shProj').value;
    const pages=$$('#shPages input:checked').map(i=>i.value);
    const kpis=$$('#shKpis input:checked').map(i=>i.value);
    const charts=$$('#shCharts input:checked').map(i=>i.value);
    const hideNationalId=$('#shHideId').checked;
    const pass=$('#shPass').value;
    if(!pages.length){toast('اختر صفحة واحدة على الأقل');return;}
    const cfg={p:projId,pages,kpis,charts,hideNationalId,h:pass?hashPass(pass):null};
    const code=encodeShare(cfg);
    const url=location.origin+location.pathname+'#share='+code;
    $('#shResult').style.display='block';
    $('#shResult').innerHTML=`<div class="sh-link"><b>${ic('check')} تم إنشاء الرابط</b>
      <div class="sh-url"><input id="shUrl" value="${esc(url)}" readonly><button class="btn pri" onclick="Platform.copyShareUrl()">${ic('copy')} نسخ</button></div>
      ${pass?`<small style="color:var(--text3)">محمي بكلمة مرور. شاركها بشكل منفصل مع المستلم.</small>`:`<small style="color:var(--warn)">⚠ بلا كلمة مرور — أي شخص لديه الرابط يستطيع الفتح.</small>`}</div>`;
  }
  function copyShareUrl(){const i=$('#shUrl');i.select();
    try{navigator.clipboard.writeText(i.value);}catch(_){document.execCommand('copy');}toast('تم نسخ الرابط');}
  function closeShareModal(){$('#shareModal')?.classList.remove('open');$('#shareBg')?.classList.remove('open');}

  /* ============================================================
     وضع عارض المشاركة — مقيّد، بلا وصول لبقية النظام
  ============================================================ */
  function initShareView(code){
    const cfg=decodeShare(code);
    if(!cfg||!cfg.p){ $('#shareGate').innerHTML='<div class="login-card"><h2>رابط غير صالح</h2><p>تعذّر قراءة إعدادات المشاركة.</p></div>'; $('#shareGate').style.display='flex'; $('#loginScreen').style.display='none'; $('#appShell').style.display='none'; return; }
    isShareView=true;
    const proceed=()=>renderShareView(cfg);
    if(cfg.h){
      // password gate
      $('#loginScreen').style.display='none';$('#appShell').style.display='none';
      $('#shareGate').style.display='flex';
      $('#shareGate').innerHTML=`<form class="login-card" id="shareGateForm">
        <div class="login-logo">${ic('lock')}</div>
        <h2>محتوى محمي</h2><p>أدخل كلمة المرور لعرض اللوحة المشتركة.</p>
        <input type="password" id="shareGatePass" placeholder="كلمة المرور" autocomplete="off">
        <div class="login-err" id="shareGateErr">كلمة المرور غير صحيحة</div>
        <button class="btn pri" type="submit" style="width:100%;justify-content:center">دخول</button></form>`;
      $('#shareGateForm').onsubmit=e=>{e.preventDefault();
        if(hashPass($('#shareGatePass').value)===cfg.h){proceed();}
        else{$('#shareGateErr').style.display='block';$('#shareGatePass').value='';}};
      setTimeout(()=>$('#shareGatePass')?.focus(),100);
    } else proceed();
  }
  async function renderShareView(cfg){
    $('#shareGate').style.display='none';$('#loginScreen').style.display='none';
    $('#appShell').style.display='flex';
    // hide admin-only chrome
    $('#sidebar').classList.add('share-mode');
    $('#sbProjects').style.display='none';$('#sbTools').style.display='none';
    $('#shareBtn').style.display='none';$('#logoutBtn').style.display='none';
    const proj=PROJECTS.find(p=>p.id===cfg.p);if(!proj){return;}
    currentProject=proj;currentModule=proj.module();
    document.documentElement.style.setProperty('--brand',proj.accent);
    sharePerm={pages:cfg.pages,kpis:cfg.kpis,charts:cfg.charts,hideNationalId:cfg.hideNationalId};
    $('#topProjectName').textContent=proj.name+' — عرض مشترك';
    $('#sbShareLabel').style.display='flex';
    $('#sbShareLabel').innerHTML=`<span class="sb-ic" style="background:${proj.accent}22;color:${proj.accent}">${ic(proj.icon)}</span><span class="sb-tx"><b>${esc(proj.name)}</b><small>عرض مشترك مقيّد</small></span>`;
    $('#projectHost').innerHTML='<div class="empty" style="padding:80px"><div class="spin" style="margin:0 auto 16px"></div><b>جارٍ التحميل…</b></div>';
    const loaded=await loadProjectData(proj);
    currentModule.setData(loaded.data);
    const res=currentModule.render($('#projectHost'),sharePerm);
    currentPages=res.pages;buildPageNav(res.pages,res.alertCount);
    if(res.pages.length)goPage(res.pages[0].id);
    $$('.themeBtn').forEach(b=>b.onclick=toggleTheme);
    $('#dbg').onclick=closeDrawer;
    document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDrawer();});
  }

  /* ============ init ============ */
  function init(){
    let saved='light';try{saved=localStorage.getItem('cd_theme')||'light';}catch(_){}
    applyTheme(saved);
    checkAuth();
    $('#loader')?.classList.add('hide');
  }

  return {init,openProject,goPage,openDrawer,closeDrawer,downloadCSV,toggleTheme,logout,
          createShareLink,copyShareUrl,closeShareModal,openShareModal};
})();

if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',Platform.init);
else Platform.init();

</script>
</body>
</html>
