<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>منصّة إدارة المشاريع الإنسانية</title>
<style>
/* ===================================================================
   الطفولة المكسورة — لوحة الإدارة التنفيذية (مستقلّة بالكامل، بلا إنترنت)
   =================================================================== */
:root{
  --ink:#16211d; --bg:#f4f2ec; --bg2:#ece9e0; --surface:#fff; --surface2:#faf8f3;
  --line:#e0dccf; --line2:#eceae0;
  --text:#16211d; --text2:#5e6760; --text3:#949a91;
  --brand:#0f6b54; --brand2:#13967340; --brand2:#149673; --brandsoft:#e3efe9;
  --gold:#b07d2b; --goldsoft:#f5ecd9;
  --male:#2563a8; --malesoft:#e4edf7; --female:#bd4a86; --femalesoft:#f8e6f0;
  --ok:#1c854a; --oksoft:#e1f0e6; --warn:#bd8211; --warnsoft:#f8efd5; --bad:#c0392b; --badsoft:#f8e4e0;
  --r:14px; --r2:9px;
  --sh:0 1px 2px rgba(20,32,28,.05),0 4px 16px rgba(20,32,28,.05);
  --shl:0 10px 36px rgba(20,32,28,.13);
  --f:'Segoe UI','Noto Sans Arabic','Geeza Pro','Damascus','Al Tarikh','Tahoma','Arial',system-ui,sans-serif; --fnum:'Segoe UI',system-ui,sans-serif;
  --nav:60px;
}
[data-theme=dark]{
  --ink:#e9eee9; --bg:#0e1512; --bg2:#121b16; --surface:#16201b; --surface2:#1b271f;
  --line:#28342c; --line2:#202b24;
  --text:#e9eee9; --text2:#9faaa1; --text3:#6a756d;
  --brand:#2bbd92; --brand2:#34d3a4; --brandsoft:#10271f;
  --gold:#dcab52; --goldsoft:#2a2113;
  --male:#5b9be8; --malesoft:#152339; --female:#e576b0; --femalesoft:#321a29;
  --ok:#33d07c; --oksoft:#0f2a1a; --warn:#e6b545; --warnsoft:#2b2410; --bad:#ef6b5c; --badsoft:#2d1714;
  --sh:0 1px 2px rgba(0,0,0,.4),0 6px 22px rgba(0,0,0,.4); --shl:0 12px 40px rgba(0,0,0,.55);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--f);direction:rtl;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s}
a{color:var(--brand);text-decoration:none}
::selection{background:var(--brand);color:#fff}
.num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
svg{display:block}

/* ---- icons (inline svg sizing) ---- */
.i{width:1em;height:1em;display:inline-block;vertical-align:-.12em;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* ---- topbar ---- */
.topbar{position:sticky;top:0;z-index:1200;height:var(--nav);display:flex;align-items:center;gap:16px;padding:0 20px;background:color-mix(in srgb,var(--surface) 90%,transparent);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:11px;white-space:nowrap}
.brand .mk{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;background:var(--brand);color:#fff;font-size:1.1rem}
.brand .t{font-weight:800;font-size:1.02rem;line-height:1.1}
.brand .t small{display:block;font-weight:500;font-size:.67rem;color:var(--text3);margin-top:2px}
.nav{display:flex;gap:2px;margin-inline-start:8px;overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav button{border:0;background:transparent;color:var(--text2);font-family:inherit;font-weight:600;font-size:.9rem;padding:8px 13px;border-radius:9px;cursor:pointer;white-space:nowrap;transition:.14s;display:inline-flex;align-items:center;gap:7px}
.nav button:hover{background:var(--bg2);color:var(--text)}
.nav button.active{background:var(--brand);color:#fff}
.nav .bn{background:var(--bad);color:#fff;font-size:.67rem;font-weight:800;min-width:18px;height:18px;padding:0 5px;border-radius:9px;display:grid;place-items:center}
.nav button.active .bn{background:rgba(255,255,255,.25)}
.tbr{margin-inline-start:auto;display:flex;align-items:center;gap:8px}
.src{font-size:.7rem;font-weight:700;padding:5px 10px;border-radius:7px;background:var(--goldsoft);color:var(--gold);display:inline-flex;gap:5px;align-items:center;white-space:nowrap}
.src.live{background:var(--oksoft);color:var(--ok)}
.ib{width:38px;height:38px;border-radius:9px;border:1px solid var(--line);background:var(--surface);color:var(--text);cursor:pointer;display:grid;place-items:center;transition:.14s;font-size:1.05rem}
.ib:hover{border-color:var(--brand);color:var(--brand)}

/* ---- shell ---- */
.wrap{max-width:1480px;margin:0 auto;padding:22px 20px 90px}
.page{display:none;animation:in .3s ease}
.page.active{display:block}
@keyframes in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.phead{display:flex;align-items:flex-end;gap:14px;margin:4px 2px 20px;flex-wrap:wrap}
.phead .eb{font-size:.7rem;font-weight:800;letter-spacing:1px;color:var(--gold);margin-bottom:5px}
.phead h1{margin:0;font-size:1.5rem;font-weight:800;letter-spacing:-.3px}
.phead .meta{margin-inline-start:auto;font-size:.8rem;color:var(--text3)}
.slabel{display:flex;align-items:center;gap:9px;margin:26px 2px 14px;font-size:.84rem;font-weight:800;color:var(--text2)}
.slabel::before{content:"";width:3px;height:15px;background:var(--gold);border-radius:2px}
.slabel .hint{margin-inline-start:auto;font-weight:500;color:var(--text3);font-size:.76rem}

/* ---- KPI ---- */
.kpis{display:grid;gap:13px;grid-template-columns:repeat(auto-fill,minmax(186px,1fr))}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px;box-shadow:var(--sh);position:relative;overflow:hidden;transition:transform .15s,box-shadow .15s}
.kpi:hover{transform:translateY(-2px);box-shadow:var(--shl)}
.kpi .tp{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.kpi .ic{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;font-size:1.05rem}
.kpi .pg{font-size:.7rem;font-weight:800;padding:3px 8px;border-radius:6px}
.kpi .v{font-size:1.75rem;font-weight:800;line-height:1;letter-spacing:-.5px}
.kpi .l{color:var(--text2);font-size:.82rem;margin-top:6px;font-weight:700}
.kpi .s{color:var(--text3);font-size:.72rem;margin-top:3px}
.b-brand .ic{background:var(--brandsoft);color:var(--brand)} .b-male .ic{background:var(--malesoft);color:var(--male)}
.b-female .ic{background:var(--femalesoft);color:var(--female)} .b-ok .ic{background:var(--oksoft);color:var(--ok)}
.b-bad .ic{background:var(--badsoft);color:var(--bad)} .b-warn .ic{background:var(--warnsoft);color:var(--warn)}
.b-gold .ic{background:var(--goldsoft);color:var(--gold)}
.pg.up{background:var(--oksoft);color:var(--ok)} .pg.dn{background:var(--badsoft);color:var(--bad)} .pg.fl{background:var(--bg2);color:var(--text3)}

/* ---- grid + panels ---- */
.grid{display:grid;gap:16px}
.g2{grid-template-columns:repeat(auto-fit,minmax(380px,1fr))}
.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:var(--sh)}
.panel>h3{margin:0 0 16px;font-size:.96rem;font-weight:800;display:flex;align-items:center;gap:8px}
.panel>h3 .tag{margin-inline-start:auto;font-size:.68rem;font-weight:700;color:var(--text3);background:var(--bg2);padding:3px 9px;border-radius:6px}

/* ---- SVG chart helpers ---- */
.svgchart{width:100%;height:auto;overflow:visible;font-family:var(--f)}
.svgchart text{fill:var(--text2);font-size:11px}
.svgchart .gl{stroke:var(--line);stroke-width:1}
.svgchart .axis{fill:var(--text3);font-size:10px}
.chart-legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:14px;font-size:.8rem;color:var(--text2)}
.chart-legend span{display:inline-flex;align-items:center;gap:6px}
.chart-legend i{width:11px;height:11px;border-radius:3px;display:inline-block}

/* ---- alert banner / list ---- */
.alertbar{display:flex;align-items:center;gap:14px;padding:16px 18px;border-radius:var(--r);background:linear-gradient(100deg,var(--badsoft),color-mix(in srgb,var(--badsoft) 45%,var(--surface)));border:1px solid color-mix(in srgb,var(--bad) 28%,var(--line));margin-bottom:18px}
.alertbar .big{font-size:2rem;font-weight:800;color:var(--bad);line-height:1}
.alertbar .tx{flex:1}.alertbar .tx b{font-size:1.02rem}.alertbar .tx p{margin:3px 0 0;color:var(--text2);font-size:.85rem}
.alist{display:flex;flex-direction:column;gap:1px;background:var(--line2);border-radius:var(--r);overflow:hidden;border:1px solid var(--line)}
.arow{display:grid;grid-template-columns:auto 1fr auto auto;align-items:center;gap:12px;background:var(--surface);padding:12px 15px;transition:.12s}
.arow:hover{background:var(--surface2)}
.arow .bx{font-weight:800;font-size:.82rem;background:var(--bg2);padding:4px 9px;border-radius:7px;color:var(--text2)}
.arow .wh b{font-size:.92rem}.arow .wh span{display:block;font-size:.76rem;color:var(--text3);margin-top:2px}
.arow .stk{font-size:.76rem;font-weight:800;padding:4px 10px;border-radius:20px;white-space:nowrap}
.stk.s1{background:var(--warnsoft);color:var(--warn)} .stk.s2{background:var(--badsoft);color:var(--bad)}
.arow .go{border:1px solid var(--line);background:var(--surface);color:var(--text2);width:32px;height:32px;border-radius:8px;cursor:pointer;display:grid;place-items:center;transition:.12s}
.arow .go:hover{border-color:var(--brand);color:var(--brand)}

/* ---- toolbar ---- */
.toolbar{display:flex;flex-wrap:wrap;gap:9px;align-items:center;margin-bottom:16px}
.toolbar input,.toolbar select{font-family:inherit;font-size:.88rem;padding:9px 12px;border:1px solid var(--line);border-radius:var(--r2);background:var(--surface);color:var(--text);outline:none;transition:.14s}
.toolbar input{flex:1;min-width:200px}
.toolbar input:focus,.toolbar select:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brandsoft)}
.cnt{font-size:.78rem;font-weight:800;color:var(--text2);background:var(--bg2);padding:7px 12px;border-radius:8px}
.btn{font-family:inherit;font-weight:800;font-size:.85rem;cursor:pointer;padding:9px 14px;border-radius:var(--r2);border:1px solid var(--line);background:var(--surface);color:var(--text);transition:.14s;display:inline-flex;gap:7px;align-items:center}
.btn:hover{border-color:var(--brand);color:var(--brand)}
.btn.pri{background:var(--brand);color:#fff;border-color:var(--brand)} .btn.pri:hover{background:var(--brand2);color:#fff}
.btn.gold{background:var(--gold);color:#fff;border-color:var(--gold)} .btn.gold:hover{filter:brightness(1.06);color:#fff}

/* ---- cards ---- */
.cards{display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(248px,1fr))}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);cursor:pointer;transition:transform .15s,box-shadow .15s,border-color .15s;overflow:hidden}
.card:hover{transform:translateY(-3px);box-shadow:var(--shl);border-color:var(--brand)}
.card .hd{padding:14px 15px 0;display:flex;gap:12px;align-items:center}
.card .av{width:48px;height:48px;border-radius:12px;display:grid;place-items:center;font-size:1.2rem;font-weight:800;flex-shrink:0}
.card.m .av{background:var(--malesoft);color:var(--male)} .card.f .av{background:var(--femalesoft);color:var(--female)}
.card .ht{min-width:0}.card .ht b{font-size:.96rem;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.card .ht span{font-size:.76rem;color:var(--text3)}
.card .bd{padding:12px 15px 15px}
.card .rw{display:flex;justify-content:space-between;font-size:.8rem;padding:4px 0;color:var(--text2)}.card .rw b{color:var(--text);font-weight:700}
.card .ft{margin-top:10px;padding-top:11px;border-top:1px solid var(--line2);display:flex;justify-content:space-between;align-items:center}
.dt{font-size:.72rem;font-weight:700;color:var(--text3)}
.chip{font-size:.7rem;font-weight:800;padding:4px 10px;border-radius:20px;display:inline-flex;gap:5px;align-items:center}
.chip.ok{background:var(--oksoft);color:var(--ok)} .chip.warn{background:var(--warnsoft);color:var(--warn)} .chip.bad{background:var(--badsoft);color:var(--bad)} .chip.mute{background:var(--bg2);color:var(--text3)}
.strip{display:flex;gap:2px;margin-top:10px}.strip i{flex:1;height:6px;border-radius:2px;background:var(--line)}.strip i.p{background:var(--ok)}.strip i.x{background:var(--bad);opacity:.55}

/* ---- pager ---- */
.pager{display:flex;justify-content:center;gap:5px;margin-top:22px;flex-wrap:wrap}
.pager button{min-width:36px;height:36px;border:1px solid var(--line);background:var(--surface);color:var(--text);border-radius:8px;cursor:pointer;font-family:inherit;font-weight:800;transition:.12s}
.pager button:hover:not(:disabled){border-color:var(--brand);color:var(--brand)} .pager button.active{background:var(--brand);color:#fff;border-color:var(--brand)} .pager button:disabled{opacity:.35;cursor:default}

/* ---- table ---- */
.tw{overflow-x:auto;border-radius:var(--r);border:1px solid var(--line)}
table.t{width:100%;border-collapse:collapse;background:var(--surface);font-size:.87rem}
table.t thead th{background:var(--surface2);text-align:right;padding:12px 14px;font-weight:800;color:var(--text2);border-bottom:1px solid var(--line);white-space:nowrap}
table.t tbody td{padding:11px 14px;border-bottom:1px solid var(--line2)}
table.t tbody tr:last-child td{border-bottom:0}
table.t tbody tr:hover{background:var(--surface2)}
table.t tfoot td{padding:12px 14px;font-weight:800;background:var(--surface2);border-top:2px solid var(--line)}

/* ---- horizontal bars (HTML, reliable Arabic) ---- */
.hbars{display:flex;flex-direction:column;gap:11px;padding:4px 0}
.hbar{display:grid;grid-template-columns:minmax(90px,150px) 1fr auto;align-items:center;gap:12px}
.hbl{font-size:.84rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:start}
.hbt{height:22px;background:var(--bg2);border-radius:7px;overflow:hidden}
.hbf{height:100%;border-radius:7px;transition:width .8s ease;min-width:3px}
.hbv{font-size:.85rem;font-weight:800;color:var(--text2);min-width:26px;text-align:left}

/* ---- worker bars ---- */
.wbar{display:grid;grid-template-columns:130px 1fr auto;align-items:center;gap:12px;padding:9px 0}
.wbar .nm{font-weight:700;font-size:.86rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wbar .tk{height:10px;background:var(--bg2);border-radius:6px;overflow:hidden}
.wbar .fl{height:100%;background:linear-gradient(90deg,var(--brand),var(--brand2));border-radius:6px;transition:width .8s ease}
.wbar .v{font-weight:800;font-size:.84rem;min-width:38px;text-align:left}

/* ---- city/geo bars (offline map replacement) ---- */
.geo{display:flex;flex-direction:column;gap:10px}
.georow{display:grid;grid-template-columns:160px 1fr auto;align-items:center;gap:12px}
.georow .cn{font-weight:700;font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.georow .gt{height:22px;background:var(--bg2);border-radius:7px;overflow:hidden;display:flex}
.georow .gm{background:var(--male)}.georow .gf{background:var(--female)}
.georow .gv{font-weight:800;font-size:.85rem;min-width:30px;text-align:left}

/* ---- drawer ---- */
.dbg{position:fixed;inset:0;background:rgba(10,16,14,.5);backdrop-filter:blur(3px);opacity:0;visibility:hidden;transition:opacity .25s,visibility .25s;z-index:1400}
.dbg.open{opacity:1;visibility:visible}
.drawer{position:fixed;top:0;right:0;height:100%;width:min(520px,94vw);background:var(--bg);box-shadow:var(--shl);transform:translateX(100%);visibility:hidden;transition:transform .3s cubic-bezier(.4,0,.2,1),visibility .3s;z-index:1500;overflow-y:auto}
.drawer.open{transform:translateX(0);visibility:visible}
.dh{padding:22px;background:var(--brand);color:#fff;position:relative}
.dh.f{background:var(--female)}
.dh .cl{position:absolute;top:16px;left:16px;width:34px;height:34px;border-radius:9px;border:0;background:rgba(255,255,255,.18);color:#fff;cursor:pointer;font-size:1.2rem;display:grid;place-items:center}
.dh .avl{width:64px;height:64px;border-radius:16px;background:rgba(255,255,255,.2);display:grid;place-items:center;font-size:1.8rem;font-weight:800;margin-bottom:12px}
.dh h2{margin:0;font-size:1.3rem}.dh .sb{opacity:.9;font-size:.85rem;margin-top:4px}
.db{padding:20px 22px}
.ds{margin-bottom:22px}
.ds h4{font-size:.74rem;font-weight:800;color:var(--gold);letter-spacing:.6px;margin:0 0 11px;display:flex;align-items:center;gap:7px}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:10px 14px}
.df{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:10px 12px}
.df .k{font-size:.72rem;color:var(--text3);margin-bottom:3px}.df .vv{font-size:.9rem;font-weight:700}.df.full{grid-column:span 2}
.dms{display:grid;grid-template-columns:repeat(6,1fr);gap:6px}
.dm{text-align:center;padding:8px 4px;border-radius:8px;font-size:.72rem;font-weight:800;border:1px solid var(--line)}
.dm.p{background:var(--oksoft);color:var(--ok);border-color:transparent}.dm.x{background:var(--badsoft);color:var(--bad);border-color:transparent}.dm.b{color:var(--text3)}
.dm small{display:block;font-weight:500;font-size:.62rem;opacity:.8;margin-bottom:2px}

/* ---- empty ---- */
.empty{text-align:center;padding:54px 20px;color:var(--text3)}
.empty .ei{font-size:2.4rem;opacity:.4;margin-bottom:12px}
.empty b{display:block;color:var(--text2);font-size:1rem;margin-bottom:6px}
.empty p{margin:0 auto;max-width:400px;font-size:.85rem;line-height:1.6}
.empty code{background:var(--bg2);padding:1px 7px;border-radius:5px;font-size:.82rem}

/* ---- loader / toast ---- */
.loader{position:fixed;inset:0;background:var(--bg);z-index:3000;display:grid;place-items:center;transition:opacity .4s}
.loader.hide{opacity:0;pointer-events:none}
.spin{width:44px;height:44px;border-radius:50%;border:4px solid var(--line);border-top-color:var(--brand);animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.loader p{margin-top:14px;color:var(--text2);font-weight:700;font-size:.9rem}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(18px);background:var(--ink);color:var(--bg);padding:12px 20px;border-radius:11px;font-weight:800;font-size:.88rem;box-shadow:var(--shl);opacity:0;pointer-events:none;transition:.3s;z-index:3200}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.fab{position:fixed;bottom:20px;inset-inline-start:20px;display:flex;gap:8px;z-index:1000}

@media(max-width:720px){.brand .t small{display:none}.topbar{flex-wrap:wrap;height:auto;padding:9px 13px}.nav{order:3;width:100%}.wrap{padding:16px 13px 90px}.dg{grid-template-columns:1fr}.df.full{grid-column:span 1}.georow{grid-template-columns:110px 1fr auto}}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}

/* ===================================================================
   إضافات المنصّة: Sidebar · تسجيل الدخول · المشاركة
   =================================================================== */

/* ---- app shell with sidebar ---- */
.app-shell{display:flex;min-height:100vh}
.sidebar{width:264px;flex-shrink:0;background:var(--surface);border-inline-end:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;z-index:900}
.sb-brand{display:flex;align-items:center;gap:11px;padding:18px 18px;border-bottom:1px solid var(--line)}
.sb-brand .mk{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;background:var(--brand);color:#fff;font-size:1.2rem;flex-shrink:0}
.sb-brand .t{font-weight:800;font-size:1rem;line-height:1.15}.sb-brand .t small{display:block;font-weight:500;font-size:.68rem;color:var(--text3);margin-top:2px}
.sb-label{font-size:.7rem;font-weight:800;letter-spacing:.5px;color:var(--text3);padding:16px 18px 8px}
.sb-proj,.sb-share-label{display:flex;align-items:center;gap:11px;width:100%;border:0;background:transparent;cursor:pointer;padding:11px 14px;margin:2px 10px;width:calc(100% - 20px);border-radius:11px;text-align:start;transition:.14s;font-family:inherit}
.sb-proj:hover{background:var(--bg2)}
.sb-proj.active{background:var(--brandsoft)}
.sb-proj.active .sb-tx b{color:var(--brand)}
.sb-ic{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;flex-shrink:0;font-size:1.05rem}
.sb-tx{min-width:0}.sb-tx b{font-size:.9rem;font-weight:700;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}.sb-tx small{font-size:.72rem;color:var(--text3)}
.sb-tools{margin-top:auto;border-top:1px solid var(--line);padding:10px}
.sb-tool{display:flex;align-items:center;gap:10px;width:100%;border:0;background:transparent;cursor:pointer;padding:10px 12px;border-radius:10px;color:var(--text2);font-family:inherit;font-weight:600;font-size:.86rem;transition:.14s}
.sb-tool:hover{background:var(--bg2);color:var(--text)}
.sb-tool.danger:hover{background:var(--badsoft);color:var(--bad)}
.sb-share-label{cursor:default}

/* ---- main column ---- */
.main-col{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar2{position:sticky;top:0;z-index:800;height:58px;display:flex;align-items:center;gap:14px;padding:0 22px;background:color-mix(in srgb,var(--surface) 90%,transparent);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.topbar2 .pname{font-weight:800;font-size:1.05rem}
.page-nav{display:flex;gap:2px;margin-inline-start:8px;overflow-x:auto;scrollbar-width:none}
.page-nav::-webkit-scrollbar{display:none}
.page-nav button{border:0;background:transparent;color:var(--text2);font-family:inherit;font-weight:600;font-size:.88rem;padding:7px 12px;border-radius:9px;cursor:pointer;white-space:nowrap;transition:.14s;display:inline-flex;align-items:center;gap:6px}
.page-nav button:hover{background:var(--bg2);color:var(--text)}
.page-nav button.active{background:var(--brand);color:#fff}
.page-nav .bn{background:var(--bad);color:#fff;font-size:.66rem;font-weight:800;min-width:17px;height:17px;padding:0 5px;border-radius:9px;display:grid;place-items:center}
.page-nav button.active .bn{background:rgba(255,255,255,.25)}
.top-actions{margin-inline-start:auto;display:flex;align-items:center;gap:8px}
.proj-host{flex:1}

/* ---- login screen ---- */
.login-screen,.share-gate{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(1200px 600px at 50% -10%,var(--brandsoft),var(--bg));padding:20px}
.login-card{background:var(--surface);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shl);padding:38px 34px;width:100%;max-width:380px;text-align:center}
.login-logo{width:64px;height:64px;border-radius:18px;background:var(--brand);color:#fff;display:grid;place-items:center;font-size:1.7rem;margin:0 auto 18px}
.login-card h2{margin:0 0 6px;font-size:1.4rem;font-weight:800}
.login-card p{margin:0 0 22px;color:var(--text2);font-size:.88rem}
.login-card input{width:100%;font-family:inherit;font-size:.92rem;padding:12px 14px;border:1px solid var(--line);border-radius:11px;background:var(--surface2);color:var(--text);outline:none;margin-bottom:12px;transition:.14s}
.login-card input:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brandsoft)}
.login-err{display:none;color:var(--bad);font-size:.82rem;font-weight:700;margin-bottom:12px}
.login-hint{margin-top:18px;font-size:.76rem;color:var(--text3)}
.login-hint code{background:var(--bg2);padding:1px 6px;border-radius:5px}

/* ---- share modal ---- */
.share-bg{position:fixed;inset:0;background:rgba(10,16,14,.55);backdrop-filter:blur(3px);opacity:0;visibility:hidden;transition:.25s;z-index:1600}
.share-bg.open{opacity:1;visibility:visible}
.share-modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-46%);width:min(600px,94vw);max-height:88vh;overflow-y:auto;background:var(--bg);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shl);opacity:0;visibility:hidden;transition:.25s;z-index:1700}
.share-modal.open{opacity:1;visibility:visible;transform:translate(-50%,-50%)}
.share-head{display:flex;align-items:center;gap:12px;padding:20px 22px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--bg);z-index:2}
.share-head .si{width:40px;height:40px;border-radius:11px;background:var(--brandsoft);color:var(--brand);display:grid;place-items:center;font-size:1.1rem}
.share-head h3{margin:0;font-size:1.1rem;font-weight:800}.share-head p{margin:2px 0 0;font-size:.78rem;color:var(--text3)}
.share-head .cl{margin-inline-start:auto;width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:var(--surface);color:var(--text2);cursor:pointer;font-size:1.1rem}
.share-body{padding:20px 22px}
.share-foot{padding:16px 22px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;position:sticky;bottom:0;background:var(--bg)}
.sh-row{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.sh-row label{font-weight:700;font-size:.88rem;display:flex;align-items:center;gap:6px;min-width:130px}
.sh-row select,.sh-row input[type=password]{flex:1;font-family:inherit;font-size:.88rem;padding:9px 12px;border:1px solid var(--line);border-radius:10px;background:var(--surface);color:var(--text);outline:none}
.sh-row input[type=checkbox]{width:18px;height:18px;accent-color:var(--brand)}
.sh-sec{margin-bottom:18px}
.sh-sec h4{font-size:.78rem;font-weight:800;color:var(--gold);margin:0 0 10px;display:flex;align-items:center;gap:7px}
.sh-checks{display:flex;flex-wrap:wrap;gap:8px}
.sh-chk{display:inline-flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--line);border-radius:9px;padding:7px 11px;cursor:pointer;font-size:.82rem;font-weight:600;transition:.12s}
.sh-chk:hover{border-color:var(--brand)}
.sh-chk input{accent-color:var(--brand)}
.sh-chk input:checked+span{color:var(--brand)}
.sh-link{background:var(--brandsoft);border:1px solid color-mix(in srgb,var(--brand) 30%,var(--line));border-radius:12px;padding:16px;margin-top:16px}
.sh-link b{display:flex;align-items:center;gap:7px;margin-bottom:10px;color:var(--brand)}
.sh-url{display:flex;gap:8px}.sh-url input{flex:1;font-family:var(--f);font-size:.82rem;padding:9px 11px;border:1px solid var(--line);border-radius:9px;background:var(--surface);color:var(--text)}

/* ---- share-mode sidebar ---- */
.sidebar.share-mode .sb-label{display:none}

@media(max-width:860px){
  .sidebar{position:fixed;inset-inline-start:0;top:0;transform:translateX(-100%);transition:transform .25s}
  [dir=rtl] .sidebar{inset-inline-start:auto;inset-inline-end:0;transform:translateX(100%)}
  .sidebar.show{transform:translateX(0)}
  .sb-row label{min-width:auto}
}

<script>
/* ===================================================================

/* ---------- إعدادات المدير (غيّرها لاحقاً) ---------- */
const ADMIN = { user: 'admin', pass: 'admin' };  // ← بيانات الدخول الافتراضية

/* ---------- ثوابت ---------- */

/* ---------- helpers ---------- */
const $=(s,r=document)=>r.querySelector(s);

function toast(m){const t=$('#toast');if(!t)return;t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2600);}

  calc:'<path d="M5 2h14v20H5zM8 6h8M8 10h.01M12 10h.01M16 10h.01M8 14h.01M12 14h.01M16 14h4M8 18h.01M12 18h.01"/>',

  eyeoff:'<path d="M9.9 4.2A11 11 0 0112 4c7 0 11 8 11 8a18 18 0 01-2.2 3.2M6.6 6.6A18 18 0 001 12s4 8 11 8a11 11 0 005.4-1.4M2 2l20 20M9.9 9.9a3 3 0 004.2 4.2"/>',

function ic(name,cls){return `<svg class="i ${cls||''}" viewBox="0 0 24 24" aria-hidden="true">${ICON[name]||''}</svg>`;}

/* ===================================================================
   محرّك رسوم SVG (مشترك)
=================================================================== */
function svgBar(data,opts={}){
  const W=opts.w||560,H=opts.h||260,pad={t:14,r:10,b:34,l:38};
  const max=Math.max(1,...data.map(d=>d.value)),iw=W-pad.l-pad.r,ih=H-pad.t-pad.b;
  const bw=iw/data.length,barw=Math.min(opts.barw||38,bw*.62);
  const grid=cssv('--line'),txt=cssv('--text2'),def=opts.color||cssv('--brand');let g='';
  for(let i=0;i<=4;i++){const y=pad.t+ih-(ih*i/4);g+=`<line class="gl" x1="${pad.l}" y1="${y}" x2="${W-pad.r}" y2="${y}"/><text class="axis" x="${pad.l-6}" y="${y+3}" text-anchor="end">${Math.round(max*i/4)}</text>`;}
  data.forEach((d,i)=>{const x=pad.l+bw*i+(bw-barw)/2,h=ih*(d.value/max),y=pad.t+ih-h;
    g+=`<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barw.toFixed(1)}" height="${Math.max(0,h).toFixed(1)}" rx="5" fill="${d.color||def}"><title>${esc(d.label)}: ${d.value}</title></rect>`;
    if(d.value>0)g+=`<text x="${(x+barw/2).toFixed(1)}" y="${(y-5).toFixed(1)}" text-anchor="middle" font-weight="700" font-size="11" fill="${txt}">${d.value}</text>`;
    g+=`<text class="axis" x="${(pad.l+bw*i+bw/2).toFixed(1)}" y="${H-12}" text-anchor="middle">${esc(d.label)}</text>`;});
  return `<svg class="svgchart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">${g}</svg>`;
}
function hbars(data,opts={}){
  const def=opts.color||cssv('--brand'),max=Math.max(1,...data.map(d=>d.value));
  return `<div class="hbars">${data.map(d=>{const w=(d.value/max*100).toFixed(1);
    return `<div class="hbar"><div class="hbl" title="${esc(d.label)}">${esc(d.label)}</div>
      <div class="hbt"><div class="hbf" style="width:${w}%;background:${d.color||def}"></div></div>
      <div class="hbv num">${d.value}</div></div>`;}).join('')}</div>`;
}
function svgStacked(labels,A,B,opts={}){
  const W=opts.w||560,H=opts.h||260,pad={t:14,r:10,b:34,l:38};
  const totals=labels.map((_,i)=>A[i]+B[i]),max=Math.max(1,...totals);
  const iw=W-pad.l-pad.r,ih=H-pad.t-pad.b,bw=iw/labels.length,barw=Math.min(40,bw*.6);
  const cA=opts.colorA||cssv('--ok'),cB=opts.colorB||cssv('--bad');let g='';
  for(let i=0;i<=4;i++){const y=pad.t+ih-(ih*i/4);g+=`<line class="gl" x1="${pad.l}" y1="${y}" x2="${W-pad.r}" y2="${y}"/><text class="axis" x="${pad.l-6}" y="${y+3}" text-anchor="end">${Math.round(max*i/4)}</text>`;}
  labels.forEach((lb,i)=>{const x=pad.l+bw*i+(bw-barw)/2,hA=ih*(A[i]/max),hB=ih*(B[i]/max),yA=pad.t+ih-hA,yB=yA-hB;
    g+=`<rect x="${x.toFixed(1)}" y="${yA.toFixed(1)}" width="${barw.toFixed(1)}" height="${hA.toFixed(1)}" rx="3" fill="${cA}"><title>${esc(lb)}: ${A[i]}</title></rect>`;

<script>
/* ===================================================================
   مشروع كفالة الأطفال — وحدة العرض (project_children.js)
